name: Railway Automation

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        worker: [1, 2, 3, 4, 5]

    timeout-minutes: 7

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: |
          npm init -y
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth dotenv

      - name: 🌐 Install Playwright browsers
        run: |
          npx playwright install --with-deps

      - name: ▶️ Run worker ${{ matrix.worker }}
        run: |
          echo "Worker ${{ matrix.worker }} started"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node index2.js

  trigger-next:
    needs: run
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔁 Trigger next batch
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Trigger next batch..."
          gh workflow run "Railway Automation" --ref main
