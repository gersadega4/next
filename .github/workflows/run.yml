name: Railway Automation

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        worker: [1, 2, 3, 4, 5]

    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install deps
        run: |
          pip install selenium webdriver-manager

      - name: 🌐 Install Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      - name: ▶️ Run worker ${{ matrix.worker }}
        run: |
          echo "Worker ${{ matrix.worker }} started"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python main.py

  trigger-next:
    needs: run
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔁 Trigger next batch
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Trigger next batch..."
          gh workflow run "Railway Automation" --ref main
